<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <!-- Left Section -->
        <div class="left">
            <img src="img.webp" alt="Laundry Image">
        </div>

        <!-- Right Section -->
        <div class="right">
            <form>
                <h1>Hello Again!</h1>

                <p>Welcome back! we missed you!</p>
                <label>Email</label>
                <input type="email" placeholder="Emailid@site.com">

                <label>Password</label>
                <input type="password" placeholder="Password">

                <a href="#">Forgot Password</a>

                <button type="submit">Login</button>

                <h5>Not a member? <span>Register Now</span></h5>
            </form>
        </div>
    </div>
</body>

</html>
